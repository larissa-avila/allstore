<div class="pagina">
    <div class="logo-container">
        <h1 class="logo">All Store</h1>
        <span class="logo-sub">sua loja favorita</span>
    </div>

    <form class="card" (ngSubmit)="entrar()">
        <h2 class="titulo">Entrar</h2>

        <div class="divider"></div>

        <div class="campo">
            <label for="username">Usuário</label>
            <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                placeholder="Digite seu usuário"
                [(ngModel)]="username"
                required />
        </div>

        <div class="campo">
            <label for="password">Senha</label>
            <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Digite sua senha"
                [(ngModel)]="password"
                required />
        </div>

        @if (erro) {
            <p class="erro" role="alert">
                {{ erro }}
            </p>
        }

        <button
            type="submit"
            class="btn-entrar"
            [disabled]="carregando"
            aria-label="Entrar no sistema">

            {{ carregando ? 'Entrando...' : 'Entrar' }}

        </button>
    </form>
</div>
